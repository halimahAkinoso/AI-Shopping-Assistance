services:
  # ─── Backend: FastAPI ────────────────────────────────────────────────────────
  - type: web
    name: ai-shopping-assistance-backend
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # Set this manually in the Render dashboard
      - key: FRONTEND_URL
        sync: false          # Set to your frontend Render URL, e.g. https://ai-shopping-assistance.onrender.com

  # ─── Frontend: React / Vite (Static Site) ───────────────────────────────────
  - type: web
    name: ai-shopping-assistance
    runtime: static
    rootDir: Frontend/e-commerce
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
